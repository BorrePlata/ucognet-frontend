        <h1>UCogNet — Metacognitive AI That Improves Safely</h1>
        <p>UCogNet is a modular metacognitive AI platform with 10 cognitive modules that routes tasks to the right solving mode, executes with verifiable evidence, and evolves via gated experiments under strict safety budgets.</p>
        <h2>Key Capabilities</h2>
        <ul>
          <li><strong>Cognitive Routing:</strong> Metacognitive task dispatch to specialized solving modes</li>
          <li><strong>Gated Evolution:</strong> A/B tested changes must outperform baselines before promotion</li>
          <li><strong>Safety Budgets:</strong> Hard compute and resource limits enforced per experiment</li>
          <li><strong>Evidence Architecture:</strong> Every decision produces frozen, auditable evidence trails</li>
          <li><strong>Reproducibility:</strong> 807 tests across 10 modules, all runs frozen and replayable</li>
        </ul>
        <h2>Research</h2>
        <p>Plasma cognitive research: THC modulation at 94.12% accuracy, DMT states at 98.53% accuracy. All benchmarks reproducible.</p>
